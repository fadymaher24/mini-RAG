services :
  # FastAPI Application


  # Nginx Service


  # PostgreSQL with pgvector Service
  pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: pgvector
    ports:
      - '5432:5432'
    volumes:
      - pgvector:/var/lib/postgresql/data
    env_file:
      - .env/.env.postgres
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    

  # Qdrant (Vector Database) Service
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    env_file:
      - .env/.env.qdrant
    networks:
      - backend
    restart: always

  # Prometheus Service
    prometheus:
      image: prom/prometheus:main
      container_name: prometheus
      ports:
        - '9090:9090'
      volumes:
        - prometheus_data:/prometheus
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      networks:
        - backend
      restart: always
      commands:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/etc/prometheus/console_libraries'
        - '--web.console.templates=/etc/prometheus/consoles'
        - '--web.enable-lifecycle'


  # Grafana Dashboard Service
    grafana:
      image: grafana/grafana:12.3-ubuntu 
      container_name: grafana
      ports:
        - '3000:3000'
      env_file:
        - .env/.env.grafana
      volumes:
        - grafana_data:/var/lib/grafana
      depends_on:
        - prometheus
      networks:
        - backend
      restart: always

  # Node Exporter for system Metrics
  node_exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node_exporter
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    
    networks:
      - backend
    restart: always

  # Postgres Exporter for PostgreSQL Metrics
  postgres_exporter:
    image: promethesuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    ports:
      - '9187:9187'
    env_file:
      - ./env/.env.postgres-exporter
    networks:
      - backend
    depends_on:
      - pgvector
    restart: always 

