services :
  # FastAPI Application
  fastapi:
    build:
      context: ..
      dockerfile: docker/minirag/Dockerfile
    container_name: fastapi
    ports:
      - '8000:8000'
    env_file:
      - ./env/.env.app
    volumes:
      - fastapi_data:/app/assets
    depends_on:
      pgvector: 
        condition: service_healthy
    networks:
      - backend
    restart: always


  # Nginx Service
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fastapi
    networks:
      - backend
    restart: always

  # PostgreSQL with pgvector Service
  pgvector:
    image: pgvector/pgvector:pg18-trixie
    container_name: pgvector
    ports:
      - '5400:5432'
    volumes:
      - pgvector_data:/var/lib/postgresql
    env_file:
      - ./env/.env.postgres
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    

  # Qdrant (Vector Database) Service
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    restart: always

  # Prometheus Service
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'


  # Grafana Dashboard Service
  grafana:
    image: grafana/grafana:12.3-ubuntu 
    container_name: grafana
    ports:
      - '3000:3000'
    env_file:
      - ./env/.env.grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
      - loki
    networks:
      - backend
    restart: always

  # Node Exporter for system Metrics
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node_exporter
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    restart: always

  # Loki for log aggregation
  loki:
    image: grafana/loki:3.5.4
    container_name: loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    networks:
      - backend
    restart: always

  # Promtail log shipper (Docker logs -> Loki)
  promtail:
    image: grafana/promtail:3.5.4
    container_name: promtail
    user: root
    security_opt:
      - label=disable
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    depends_on:
      - loki
    networks:
      - backend
    restart: always

  # Postgres Exporter for PostgreSQL Metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres_exporter
    ports:
      - '9187:9187'
    env_file:
      - ./env/.env.postgres-exporter
    networks:
      - backend
    depends_on:
      - pgvector
    restart: always

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: rabbitmq
    ports:
      - '5672:5672' # AMQP port
      - '15672:15672' # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    env_file:
      - ./env/.env.rabbitmq
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8.6.2-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    env_file:
      - ./env/.env.redis
    networks: 
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["redis-server", "--appendonly", "yes","--requirepass", "${REDIS_PASSWORD:-minirag_redis_2026}"]

networks:
  backend:
      driver: bridge

volumes:
  fastapi_data:
  pgvector_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_data:
  rabbitmq_data:
  redis_data: